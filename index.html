<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>京方箱：经典经方、倪师医案、个人经验资料库</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="eyebrow">经典经方 · 倪师医案 · 个人经验</p>
      <h1>京方箱</h1>
      <p class="intro">经典经方、倪师医案、个人经验资料库。按方名、病机、症状与关键词整理，便于学习、检索与复盘。</p>
      <div class="search-wrap">
        <label for="siteSearch">搜索资料</label>
        <input id="siteSearch" type="search" placeholder="输入标题、方名、病机、症状或关键词">
      </div>
    </div>
  </header>

  <main class="content">
    <section class="summary-row" aria-label="资料概览">
      <div>
        <strong id="formulaCount">0</strong>
        <span>经典经方</span>
      </div>
      <div>
        <strong id="caseCount">0</strong>
        <span>倪师医案</span>
      </div>
      <div>
        <strong id="experienceCount">0</strong>
        <span>个人经验</span>
      </div>
    </section>

    <section class="library-section" aria-labelledby="formulasTitle">
      <div class="section-head">
        <h2 id="formulasTitle">经典经方</h2>
        <p id="formulasHint">点击卡片查看方义与应用要点。</p>
      </div>
      <div id="formulasGrid" class="card-grid" aria-live="polite"></div>
    </section>

    <section class="library-section" aria-labelledby="casesTitle">
      <div class="section-head">
        <h2 id="casesTitle">倪师医案</h2>
        <p id="casesHint">点击卡片查看辨证与处方思路。</p>
      </div>
      <div id="casesGrid" class="card-grid" aria-live="polite"></div>
    </section>

    <section class="library-section" aria-labelledby="experienceTitle">
      <div class="section-head">
        <h2 id="experienceTitle">个人经验</h2>
        <p id="experienceHint">点击卡片查看记录与复盘。</p>
      </div>
      <div id="experienceGrid" class="card-grid" aria-live="polite"></div>
    </section>

    <p id="emptyState" class="empty-state" hidden>没有找到匹配内容，请换个关键词试试。</p>
  </main>

  <footer class="site-footer">
    本站内容仅供经方学习研究，不作为诊断、治疗或自行用药依据。
  </footer>

  <div id="detailModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <button class="modal-close" type="button" aria-label="关闭详情" data-close-modal>&times;</button>
      <p id="modalCategory" class="modal-category"></p>
      <h2 id="modalTitle"></h2>
      <div id="modalTags" class="modal-tags"></div>
      <div id="modalDetails" class="detail-list"></div>
    </article>
  </div>

  <script src="./script.js"></script>
</body>
</html>
